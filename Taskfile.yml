version: '3'

dotenv: ['.env']

vars:
  CGO: CGO_ENABLED=0

tasks:
  build:
    desc: Compile all binaries
    cmds:
      - "{{.CGO}} go build ./..."

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:unit:
    desc: Run unit tests
    cmds:
      - "{{.CGO}} go test -v ./..."

  test:integration:
    desc: Run integration tests against the real system
    cmds:
      - "{{.CGO}} go test -v -tags integration ./..."

  test:
    desc: Run all tests (unit + integration)
    cmds:
      - task: test:unit
      - task: test:integration

  run:top:
    desc: Run cktop (TUI)
    cmds:
      - "{{.CGO}} go run ./cmd/cktop"

  run:agent:
    desc: Start ckagent
    cmds:
      - "{{.CGO}} go run ./cmd/ckagent"

  install:agent:
    desc: Build and install ckagent as a systemd service (requires sudo)
    cmds:
      - "{{.CGO}} go build -o /tmp/ckagent ./cmd/ckagent"
      - sudo mv /tmp/ckagent /usr/local/bin/ckagent
      - sudo cp deploy/ckagent.service /etc/systemd/system/ckagent.service
      - sudo systemctl daemon-reload
      - sudo systemctl enable ckagent
      - sudo systemctl restart ckagent
      - sudo systemctl status ckagent --no-pager

  install:api:
    desc: Build and install ckapi as a systemd service (requires sudo)
    cmds:
      - "{{.CGO}} go build -o /tmp/ckapi ./ckapi/cmd"
      - sudo mv /tmp/ckapi /usr/local/bin/ckapi
      - sudo cp deploy/ckapi.service /etc/systemd/system/ckapi.service
      - sudo systemctl daemon-reload
      - sudo systemctl enable ckapi
      - sudo systemctl restart ckapi
      - sudo systemctl status ckapi --no-pager

  install:load:
    desc: Install k6 script and systemd service for continuous load (requires sudo)
    vars:
      K6_BIN:
        sh: which k6
    cmds:
      - sudo mkdir -p /etc/cktop/k6
      - sudo cp k6/ckapi.js /etc/cktop/k6/ckapi.js
      - sed 's|ExecStart=.*|ExecStart={{.K6_BIN}} run /etc/cktop/k6/ckapi.js|' deploy/ckload.service | sudo tee /etc/systemd/system/ckload.service > /dev/null
      - sudo systemctl daemon-reload
      - sudo systemctl enable ckload
      - sudo systemctl restart ckload
      - sudo systemctl status ckload --no-pager

  deploy:scrape-config:
    desc: Deploy vmagent scrape config
    cmds:
      - cp deploy/scrape_config.yaml /etc/systemd/system/

  uninstall:agent:
    desc: Stop and remove ckagent systemd service
    cmds:
      - sudo systemctl disable --now ckagent
      - sudo rm -f /usr/local/bin/ckagent /etc/systemd/system/ckagent.service
      - sudo systemctl daemon-reload

  clean:
    desc: Remove compiled binaries
    cmds:
      - rm -f cktop

  pull:dashboard:
    desc: Pull Grafana dashboard spec from server into deploy/grafana/ckagent.json (requires GRAFANA_URL, GRAFANA_CREDS, GRAFANA_DASHBOARD_NAME in .env)
    cmds:
      - |
        curl -s -u "{{.GRAFANA_CREDS}}" \
          "{{.GRAFANA_URL}}/apis/dashboard.grafana.app/v2/namespaces/default/dashboards/{{.GRAFANA_DASHBOARD_NAME}}" \
          | jq '.spec' > deploy/grafana/ckagent.json
        echo "Pulled dashboard spec to deploy/grafana/ckagent.json"

  deploy:dashboard:
    desc: Deploy Grafana dashboard via v2 API (requires GRAFANA_URL, GRAFANA_CREDS, GRAFANA_DASHBOARD_NAME in .env)
    cmds:
      - |
        jq '{kind:"Dashboard",apiVersion:"dashboard.grafana.app/v2",metadata:{name:"{{.GRAFANA_DASHBOARD_NAME}}"},spec:.}' deploy/grafana/ckagent.json \
          | curl -s -X PUT "{{.GRAFANA_URL}}/apis/dashboard.grafana.app/v2/namespaces/default/dashboards/{{.GRAFANA_DASHBOARD_NAME}}" \
            -H "Content-Type: application/json" \
            -u "{{.GRAFANA_CREDS}}" \
            -d @-

  pull:dashboard:load:
    desc: Pull ckapi/ckload dashboard spec into deploy/grafana/ckload.json (requires GRAFANA_LOAD_DASHBOARD_NAME in .env)
    cmds:
      - |
        curl -s -u "{{.GRAFANA_CREDS}}" \
          "{{.GRAFANA_URL}}/apis/dashboard.grafana.app/v2/namespaces/default/dashboards/{{.GRAFANA_LOAD_DASHBOARD_NAME}}" \
          | jq '.spec' > deploy/grafana/ckload.json
        echo "Pulled to deploy/grafana/ckload.json"

  deploy:dashboard:load:
    desc: Deploy ckapi/ckload dashboard (requires GRAFANA_LOAD_DASHBOARD_NAME in .env)
    cmds:
      - |
        jq '{kind:"Dashboard",apiVersion:"dashboard.grafana.app/v2",metadata:{name:"{{.GRAFANA_LOAD_DASHBOARD_NAME}}"},spec:.}' deploy/grafana/ckload.json \
          | curl -s -X PUT "{{.GRAFANA_URL}}/apis/dashboard.grafana.app/v2/namespaces/default/dashboards/{{.GRAFANA_LOAD_DASHBOARD_NAME}}" \
            -H "Content-Type: application/json" \
            -u "{{.GRAFANA_CREDS}}" \
            -d @-

