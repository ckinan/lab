version: '3'

vars:
  CGO: CGO_ENABLED=0

tasks:
  build:
    desc: Compile all binaries
    cmds:
      - "{{.CGO}} go build ./..."

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:unit:
    desc: Run unit tests
    cmds:
      - "{{.CGO}} go test -v ./..."

  test:integration:
    desc: Run integration tests against the real system
    cmds:
      - "{{.CGO}} go test -v -tags integration ./..."

  test:
    desc: Run all tests (unit + integration)
    cmds:
      - task: test:unit
      - task: test:integration

  run:top:
    desc: Run cktop (TUI)
    cmds:
      - "{{.CGO}} go run ./cmd/cktop"

  run:agent:
    desc: Run ckagent (Prometheus exporter)
    cmds:
      - |
        PID=$(lsof -ti:9110 2>/dev/null)
        if [ -n "$PID" ]; then
          NAME=$(ps -p "$PID" -o comm= 2>/dev/null)
          read -p "$NAME (pid $PID) is using port 9110 — kill it? [y/N] " ans
          if [ "$ans" = "y" ]; then
            kill "$PID"
            sleep 0.5
          else
            exit 1
          fi
        fi
      - "{{.CGO}} go run ./cmd/ckagent"

  run:stat:
    desc: Run ckstat (one-shot CLI)
    cmds:
      - "{{.CGO}} go run ./cmd/ckstat"

  clean:
    desc: Remove compiled binaries
    cmds:
      - rm -f cktop
