name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Vet
        run: task vet

      - name: Unit tests
        run: task test:unit

      - name: Integration tests
        run: task test:integration
